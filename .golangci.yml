# golangci-lint v2 configuration — the static-analysis half of the AGENTS.md §10 quality
# bar. The v2 default set already enables errcheck, govet, ineffassign, staticcheck, and
# unused; revive and gosec complete the contract's five named linters. Warnings are errors:
# no broad disables (a targeted //nolint needs an in-line reason and review).
version: "2"

linters:
  enable:
    - revive
    - gosec
  exclusions:
    rules:
      # Property-style tests use seeded math/rand/v2 deliberately: the seed is
      # logged so a failure reproduces exactly. crypto/rand is unseedable and
      # would make failures unreproducible. Scoped to G404 in test files only —
      # production code keeps full gosec coverage.
      - path: _test\.go$
        linters: [gosec]
        text: "G404"
