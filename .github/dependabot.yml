# Dependabot for egl-utils-go (generated by EADOS).
# Keeps GitHub Actions and language dependencies current. Each update opens a PR that goes
# through the normal review/CI flow — Dependabot proposes, the maintainer merges.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels: ["ci"]
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
    labels: ["build"]
