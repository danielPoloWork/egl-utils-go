name: ci

# Enterprise CI gate for egl-utils-go, generated by EADOS.
# Implements the quality bar in AGENTS.md §10 across the toolchain matrix from the
# language profile. The build/test/format/lint commands come from project.yaml; the
# setup steps and language-specific extra jobs come from the profile.

on:
  pull_request:
  push:
    branches: [master]
  workflow_call:

permissions:
  contents: read

# Cancel superseded runs on a PR; never cancel a run on master (its history matters).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Cross-platform build + test matrix (from the language profile).
  # ---------------------------------------------------------------------------
  build:
    name: build / ${{ matrix.os }} / ${{ matrix.toolchain }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, toolchain: go-1.25, preset: test }
          - { os: ubuntu-24.04, toolchain: go-1.26, preset: test }
          - { os: windows-2022, toolchain: go-1.26, preset: test }
          - { os: macos-14, toolchain: go-1.26, preset: test }
    steps:
      - name: Check out the source tree
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.toolchain == 'go-1.25' && '1.25' || '1.26' }}
          cache: true

      - name: Build
        shell: bash
        run: go build ./...

      - name: Test
        shell: bash
        run: go test ./...

  # ---------------------------------------------------------------------------
  # Cross-artifact congruence — the agent-runnable consistency lint.
  # ---------------------------------------------------------------------------
  consistency:
    name: consistency / lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0          # i18n/version checks need full history
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Run the consistency lint
        run: python tools/consistency_lint.py

  # ---------------------------------------------------------------------------
  # Language-specific quality jobs (format, lint, sanitizers, …) from the profile.
  # ---------------------------------------------------------------------------
  quality:
    name: quality / lint + race + vuln
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: '1.26', cache: true }
      - name: gofumpt
        run: go install mvdan.cc/gofumpt@v0.10.0 && test -z "$(gofumpt -l .)"
      - uses: golangci/golangci-lint-action@v9
      - name: race + vuln
        run: |
          go test -race ./...
          go install golang.org/x/vuln/cmd/govulncheck@v1.4.0 && govulncheck ./...

  # Reproducible performance gate — runs only when the project has a benchmark suite.
  benchmark:
    name: benchmark / reproducible perf
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.toolchain == 'go-1.25' && '1.25' || '1.26' }}
          cache: true
      - name: Run the benchmark suite
        shell: bash
        run: go test -bench=. -benchmem ./...


  # Data-race / concurrency gate — runs only when the project exposes concurrency.
  race:
    name: race / data-race detector
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: '1.26', cache: true }
      - run: go test -race ./...

